# PowerX Brain Fusion — Configuration
# Copy this to config.yaml and fill in your keys
#
# PowerX env vars are read at runtime. Set them in Render dashboard:
#   POWERX_HOTBOT_KEY        — HotBot (GPT-5) API key
#   POWERX_GEMINI_KEY        — Google Gemini API key
#   POWERX_SAKANA_SESSION    — Sakana session cookie (optional, has default)
#   POWERX_NOVITA_KEY        — Novita AI API key (for DeepSeek V4)
#   POWERX_DEEPSEEK_TOKEN    — DeepSeek chat web token
#   POWERX_STUDENTAI_ENABLED — Enable StudentAI (default: true)
#   POWERX_EQING_ENABLED     — Enable eqing (default: true)
#   POWERX_UNITOOL_ENABLED   — Enable Unitool (default: true)
#   POWERX_SAKANA_ENABLED    — Enable Sakana (default: true)